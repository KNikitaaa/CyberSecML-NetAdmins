# Load per-user runtime settings directly from .env so stale host variables do not
# override tokens written by scripts/setup_env.ps1.
x-app-env-file: &app-env-file
  - path: .env
    required: false

x-app-image: &app-image ${OTM_DOCKER_IMAGE:-ghcr.io/knikitaaa/cybersecml-netadmins:latest}

services:
  shiny-app:
    image: *app-image
    env_file: *app-env-file
    environment:
      OFFENSIVETOOLMAPPER_DATA_DIR: /app/inst/extdata
    working_dir: /app
    command: >
      sh -lc "Rscript -e \"shiny::runApp('inst/shiny', launch.browser = FALSE, host = '0.0.0.0', port = 8788)\""
    volumes:
      - ./inst/extdata:/app/inst/extdata
    ports:
      - "8788:8788"

  mcp-server:
    image: *app-image
    env_file: *app-env-file
    environment:
      OFFENSIVETOOLMAPPER_DATA_DIR: /app/inst/extdata
      OTM_MCP_TRANSPORT: http
      OTM_MCP_PORT: 3000
    working_dir: /app
    command: sh -lc "Rscript inst/mcp/run_server.R"
    volumes:
      - ./inst/extdata:/app/inst/extdata
    ports:
      - "3000:3000"
    depends_on:
      - shiny-app
