services:
  shiny-app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      OFFENSIVETOOLMAPPER_DATA_DIR: /app/inst/extdata
    working_dir: /app
    command: >
      sh -lc "Rscript -e \"shiny::runApp('inst/shiny', launch.browser = FALSE, host = '0.0.0.0', port = 8788)\""
    volumes:
      - .:/app
    ports:
      - "8788:8788"

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      OFFENSIVETOOLMAPPER_DATA_DIR: /app/inst/extdata
      OTM_MCP_TRANSPORT: http
      OTM_MCP_PORT: 3000
    working_dir: /app
    command: sh -lc "Rscript inst/mcp/run_server.R"
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    depends_on:
      - shiny-app
